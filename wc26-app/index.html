<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WC26 · Groups & Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0F0C08;
  --panel:#1B1610;
  --panel-2:#231D13;
  --line:#3A2F1C;
  --chalk:#F5EDDA;
  --chalk-dim:#9A8B6E;
  --turf:#E8B84B;
  --turf-dim:#6B4A12;
  --third:#34D399;
  --live:#EF4444;
  --radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--night);
  color:var(--chalk);
  font-family:'Inter',system-ui,sans-serif;
  font-size:15px;
  line-height:1.45;
  min-height:100vh;
}
.display{font-family:'Oswald',sans-serif;letter-spacing:.04em}
.num{font-variant-numeric:tabular-nums}

header{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,#090704 0%, rgba(15,12,8,.97) 100%);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(8px);
}
.head-inner{
  max-width:1100px;margin:0 auto;
  padding:14px 16px 0;
  display:flex;align-items:baseline;justify-content:space-between;gap:12px;
}
.wordmark{font-family:'Oswald',sans-serif;font-weight:700;font-size:22px;letter-spacing:.06em}
.wordmark .yr{color:var(--turf)}
.stamp{font-size:11px;color:var(--chalk-dim);text-align:right;white-space:nowrap}
nav{
  max-width:1100px;margin:0 auto;
  display:flex;gap:4px;padding:10px 12px 0;
}
.tab{
  appearance:none;border:none;background:none;color:var(--chalk-dim);
  font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;letter-spacing:.1em;
  text-transform:uppercase;padding:8px 14px 12px;cursor:pointer;
  border-bottom:3px solid transparent;transition:color .15s;
}
.tab:hover{color:var(--chalk)}
.tab[aria-selected="true"]{color:var(--turf);border-bottom-color:var(--turf)}
.tab:focus-visible{outline:2px solid var(--turf);outline-offset:-2px;border-radius:4px}
.tab .badge{
  display:inline-block;min-width:18px;margin-left:6px;padding:1px 5px;
  background:var(--live);color:#fff;border-radius:9px;
  font-size:11px;font-family:'Inter';font-weight:600;letter-spacing:0;
  vertical-align:2px;
}

main{max-width:1100px;margin:0 auto;padding:20px 16px 80px}
.view{display:none}
.view.on{display:block}

.groups-grid{
  display:grid;gap:14px;
  grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
}
.gcard{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;
}
.gcard h2{
  font-family:'Oswald';font-weight:600;font-size:15px;letter-spacing:.12em;
  text-transform:uppercase;padding:10px 14px;
  background:var(--panel-2);border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
}
.gcard h2 .glabel{color:var(--turf)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  font-size:10px;font-weight:600;color:var(--chalk-dim);letter-spacing:.08em;
  text-transform:uppercase;padding:7px 4px;text-align:center;
}
th.tname{text-align:left;padding-left:14px}
td{padding:7px 4px;text-align:center;border-top:1px solid var(--line)}
td.tname{
  text-align:left;padding-left:14px;font-weight:500;
}
td.tname .row{display:flex;align-items:center;gap:8px}

td.pts{font-family:'Oswald';font-weight:600;font-size:15px}
tr.q1 td:first-child{box-shadow:inset 3px 0 0 var(--turf)}
tr.q3 td:first-child{box-shadow:inset 3px 0 0 var(--third)}

.legend{
  display:flex;gap:18px;flex-wrap:wrap;margin:14px 2px 22px;
  font-size:12px;color:var(--chalk-dim);
}
.key{display:flex;align-items:center;gap:7px}
.key i{width:10px;height:10px;border-radius:2px;display:inline-block}
.key i.g{background:var(--turf)}
.key i.y{background:var(--third)}

.fx-controls{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
select{
  background:var(--panel);color:var(--chalk);border:1px solid var(--line);
  border-radius:8px;padding:8px 12px;font-family:'Inter';font-size:14px;
}
select:focus-visible{outline:2px solid var(--turf)}
.fx-date{
  font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--chalk-dim);
  margin:22px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--line);
}
.fx-date:first-child{margin-top:0}
.fx{
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;
  background:var(--panel);border:1px solid var(--line);border-radius:8px;
  padding:10px 14px;margin-bottom:8px;
}
.fx .side{display:flex;align-items:center;gap:8px;min-width:0}
.fx .side.away{justify-content:flex-end;text-align:right}

.fx .side .tn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;flex:1 1 0;min-width:0}
.fx .side .tc{display:none;font-weight:700;font-size:12px;letter-spacing:.05em;flex:0 0 auto}
.fx .mid{text-align:center;min-width:80px}
.fx .score{font-family:'Oswald';font-weight:700;font-size:19px;letter-spacing:.06em}
.fx .ko{font-family:'Oswald';font-weight:500;font-size:15px;color:var(--chalk-dim)}
.fx .status{display:block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--chalk-dim);margin-top:1px}
.fx.live{border-color:var(--live)}
.fx.live .status{color:var(--live);font-weight:600}
.fx.live{animation:livepulse 2.4s infinite}
@keyframes livepulse{0%,100%{box-shadow:0 0 0 0 rgba(255,77,77,0)}50%{box-shadow:0 0 0 3px rgba(255,77,77,.12)}}
@media (prefers-reduced-motion:reduce){.fx.live{animation:none}}
.fx .venue{font-size:11px;color:var(--chalk-dim);letter-spacing:.04em;margin-top:2px}

.live-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.lcard{
  background:var(--panel);border:1px solid var(--live);border-radius:var(--radius);
  padding:18px 16px 14px;position:relative;
}
.lcard .minute{
  position:absolute;top:10px;right:12px;
  color:var(--live);font-weight:600;font-size:12px;
  display:flex;align-items:center;gap:5px;
}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@media (prefers-reduced-motion:reduce){.pulse{animation:none}}
.lcard .teams{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-top:8px}
.lcard .t{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}

.lcard .t span{font-size:13px;font-weight:500}
.lcard .bigscore{font-family:'Oswald';font-weight:700;font-size:34px;letter-spacing:.05em}
.lcard .gname{font-size:11px;color:var(--chalk-dim);letter-spacing:.08em;text-transform:uppercase;text-align:center;margin-top:12px}

.empty{
  text-align:center;padding:60px 20px;color:var(--chalk-dim);
}
.empty .display{font-size:18px;color:var(--chalk);margin-bottom:6px;letter-spacing:.05em}
footer{
  max-width:1100px;margin:0 auto;padding:0 16px 30px;
  font-size:11px;color:var(--chalk-dim);text-align:center;
}

.flag-em{font-size:1.15em;line-height:1;flex:0 0 auto;margin-right:5px;display:inline-block}
.flag-em.lg{font-size:2.4em;margin-right:0;margin-bottom:6px;display:block}
/* Ownership badge */
.owner-tag{
  display:inline-block;padding:1px 7px;border-radius:20px;
  font-size:10px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:#fff;margin-left:6px;
  vertical-align:middle;flex:0 0 auto;
}
/* Sweepstake tab */
.sw-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.sw-card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  overflow:hidden;
}
.sw-card .sw-head{
  padding:12px 16px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--line);
}
.sw-card .sw-head .rank{
  font-family:'Oswald';font-weight:700;font-size:22px;color:var(--chalk-dim);
  min-width:28px;
}
.sw-card .sw-head .rank.first{color:var(--third)}
.sw-card .sw-head .pname{font-family:'Oswald';font-weight:600;font-size:16px;flex:1}
.sw-card .sw-head .ptotal{font-family:'Oswald';font-weight:700;font-size:22px}
.sw-card .sw-body{padding:10px 16px}
.sw-card .sw-team{
  display:flex;align-items:center;gap:10px;
  padding:7px 0;border-bottom:1px solid var(--line);
}
.sw-card .sw-team:last-child{border-bottom:none}

.sw-card .sw-team .tname{flex:1;font-weight:500;font-size:14px}
.sw-card .sw-team .tpts{
  font-family:'Oswald';font-weight:600;font-size:15px;
  min-width:28px;text-align:right;
}
.sw-card .sw-team .tstat{font-size:12px;color:var(--chalk-dim)}
/* Timezone toggle */
.tz-row{
  max-width:1100px;margin:0 auto;
  display:flex;align-items:center;gap:6px;
  padding:7px 14px 8px;border-top:1px solid var(--line);
}
.tz-label{font-size:10px;color:var(--chalk-dim);letter-spacing:.1em;text-transform:uppercase;margin-right:4px}
.tz-btn{
  appearance:none;border:1px solid var(--line);background:none;
  color:var(--chalk-dim);font-family:'Oswald',sans-serif;font-weight:600;
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.tz-btn:hover{color:var(--chalk);border-color:var(--chalk-dim)}
.tz-btn.active{background:var(--turf);border-color:var(--turf);color:#000}
/* Stadium grid */
.std-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.stcard{
  background:var(--panel);border:1px solid var(--line);border-radius:8px;
  padding:14px 16px;
}
.stcard .name{font-family:'Oswald';font-weight:600;font-size:15px;letter-spacing:.04em}
.stcard .city{font-size:13px;color:var(--chalk-dim);margin-top:2px}
.stcard .cap{font-family:'Oswald';font-weight:500;font-size:13px;color:var(--turf);margin-top:8px}

/* ── Mobile ──────────────────────────────────────── */
@media (max-width:600px){
  /* Prevent any horizontal overflow */
  html,body{overflow-x:hidden;max-width:100vw}
  main{padding:12px 10px 80px}

  /* Header */
  .head-inner{padding:10px 12px 0}
  .wordmark{font-size:18px}
  .stamp{font-size:10px}

  /* Nav tabs — scroll horizontally, don't wrap */
  nav{overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap;padding:8px 10px 0;gap:2px}
  nav::-webkit-scrollbar{display:none}
  .tab{padding:7px 10px 10px;font-size:12px;white-space:nowrap}

  /* Timezone row — scroll horizontally */
  .tz-row{overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap;padding:6px 10px 7px;gap:5px}
  .tz-row::-webkit-scrollbar{display:none}
  .tz-btn{font-size:10px;padding:3px 8px}
  .tz-label{display:none}

  /* Groups grid — single column */
  .groups-grid{grid-template-columns:1fr;gap:10px}

  /* Standings table — hide W/D/L on mobile, keep P/GD/Pts */
  table th:nth-child(3),table td:nth-child(3),
  table th:nth-child(4),table td:nth-child(4),
  table th:nth-child(5),table td:nth-child(5){display:none}
  table{font-size:12px}
  th,td{padding:6px 3px}
  th.tname{padding-left:10px}
  td.tname{padding-left:10px}
  td.pts{font-size:13px}

  /* Owner badge — smaller on mobile */
  .owner-tag{font-size:9px;padding:1px 5px;margin-left:4px}

  /* Fixtures */
  .fx{padding:8px 10px;gap:4px}
  .fx .side .tn{display:none}
  .fx .side .tc{display:inline}
  .fx .score{font-size:16px}
  .fx .ko{font-size:13px}
  .fx .mid{min-width:60px}

  /* Sweepstake */
  .sw-grid{grid-template-columns:1fr}

  /* Live */
  .live-grid{grid-template-columns:1fr}
  .lcard .bigscore{font-size:28px}

  /* Stadiums */
  .std-grid{grid-template-columns:1fr}
}

/* ═══ KNOCKOUT BRACKET ═══ */
#view-bracket{padding-top:4px}
.ko-intro{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.ko-title{font-family:var(--display,'Oswald',sans-serif);font-size:clamp(20px,5vw,30px);letter-spacing:.04em;text-transform:uppercase;line-height:1}
.ko-sub{font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.6;margin-top:3px}
.ko-champ{display:flex;align-items:center;gap:9px;padding:7px 14px;border-radius:99px;
  background:linear-gradient(90deg,rgba(216,178,75,.16),rgba(216,178,75,.04));
  border:1px solid rgba(216,178,75,.4)}
.ko-champ .trophy{font-size:20px}
.ko-champ .lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;opacity:.7}
.ko-champ .who{font-family:var(--display,'Oswald',sans-serif);font-size:16px;letter-spacing:.03em}

/* round selector — mobile + small screens */
.ko-rounds{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:10px;margin-bottom:6px;-webkit-overflow-scrolling:touch}
.ko-rounds::-webkit-scrollbar{display:none}
.ko-round-btn{appearance:none;border:1px solid var(--line,#333);background:none;color:inherit;
  font-family:inherit;font-weight:600;font-size:12px;letter-spacing:.05em;text-transform:uppercase;
  padding:7px 13px;border-radius:99px;cursor:pointer;white-space:nowrap;opacity:.6;transition:all .15s;flex:0 0 auto}
.ko-round-btn:hover{opacity:1}
.ko-round-btn.active{opacity:1;background:var(--accent,#D8B24B);border-color:var(--accent,#D8B24B);
  color:var(--accent-ink,#000)}

/* ── Desktop bracket tree ── */
.ko-tree-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.ko-tree{display:none;gap:0;min-width:max-content;padding:4px 0}
.ko-col{display:flex;flex-direction:column;justify-content:space-around;min-width:184px;padding:0 9px;gap:14px}
.ko-col-hdr{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;opacity:.5;
  text-align:center;margin-bottom:6px;height:14px}
.ko-col.final-col{justify-content:center}

/* ── Tie card ── */
.tie{position:relative;border:1px solid var(--line,#2a2a2a);border-radius:9px;overflow:hidden;
  background:var(--card,rgba(255,255,255,.02));transition:border-color .2s,box-shadow .2s}
.tie.is-live{border-color:var(--live,#EF4444);box-shadow:0 0 0 2px rgba(239,68,68,.14)}
.tie.is-final{border-color:rgba(216,178,75,.6)}
.tie-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;padding:7px 10px}
.tie-row+.tie-row{border-top:1px solid var(--line,#2a2a2a)}
.tie-team{display:flex;align-items:center;gap:7px;min-width:0}
.tie-flag{font-size:1.05em;flex:0 0 auto;line-height:1}
.tie-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tie-row.win .tie-name{font-weight:800}
.tie-row.lose{opacity:.45}
.tie-score{font-family:var(--display,'Oswald',sans-serif);font-size:16px;min-width:30px;text-align:center;
  font-variant-numeric:tabular-nums}
.tie-score .pens{font-size:10px;opacity:.6;font-family:inherit}
.tie-owner{display:inline-block;font-size:8.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;
  padding:1px 5px;border-radius:99px;color:#000;flex:0 0 auto;margin-left:2px}
.tie-meta{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;
  background:rgba(0,0,0,.18);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;opacity:.75}
.tie-meta .live-tag{color:var(--live,#EF4444);font-weight:700;display:flex;align-items:center;gap:5px}
.tie-meta .pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--live,#EF4444);animation:koPulse 1.3s infinite}
@keyframes koPulse{0%,100%{opacity:1}50%{opacity:.25}}
.tie-tbd .tie-name{opacity:.4;font-style:italic;font-weight:500}

/* connector lines between columns */
.ko-col{position:relative}
.tie-slot{position:relative;display:flex;flex-direction:column;justify-content:center;flex:1}

/* ── Mobile round list ── */
.ko-list{display:flex;flex-direction:column;gap:10px}
.ko-list .tie{max-width:520px;margin:0 auto;width:100%}

/* trophy/champion panel */
.ko-final-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.ko-trophy-big{font-size:40px;filter:drop-shadow(0 2px 6px rgba(216,178,75,.5))}
.ko-winner-card{text-align:center;padding:14px 22px;border-radius:12px;
  background:linear-gradient(160deg,rgba(216,178,75,.18),rgba(216,178,75,.03));
  border:1px solid rgba(216,178,75,.45)}
.ko-winner-card .flag{font-size:34px;line-height:1}
.ko-winner-card .nm{font-family:var(--display,'Oswald',sans-serif);font-size:22px;letter-spacing:.04em;
  text-transform:uppercase;margin-top:4px}
.ko-winner-card .tag{font-size:10px;letter-spacing:.18em;text-transform:uppercase;opacity:.7;margin-top:2px}

.ko-empty{text-align:center;padding:48px 18px;opacity:.6}
.ko-empty .ic{font-size:34px;margin-bottom:10px}

/* show tree on wider screens, list on narrow */
@media(min-width:760px){
  .ko-tree{display:flex}
  .ko-list{display:none}
  .ko-rounds{display:none}
}

</style>
</head>
<body>

<header>
  <div class="head-inner">
    <div class="wordmark">WORLD CUP <span class="yr">26</span></div>
    <div class="stamp" id="stamp">JUN 11 – JUL 19 · SYD TIME</div>
  </div>
  <nav role="tablist">
    <button class="tab" role="tab" aria-selected="false" data-view="fixtures">Fixtures</button>
    <button class="tab" role="tab" aria-selected="true" data-view="live">Live<span class="badge" id="liveBadge" style="display:none">0</span></button>
    <button class="tab" role="tab" aria-selected="false" data-view="bracket">Knockouts</button>
  </nav>
  <div class="tz-row">
    <span class="tz-label">Time</span>
    <button class="tz-btn active" data-tz="Australia/Sydney" data-label="SYD">🇦🇺 Sydney</button>
    <button class="tz-btn" data-tz="Europe/Dublin" data-label="IRL">🇮🇪 Ireland</button>
  </div>
</header>

<main>

  <section class="view" id="view-fixtures">
    <div class="fx-controls">
      <select id="fxGroup" aria-label="Filter by group"></select>
      <select id="fxMatchday" aria-label="Filter by matchday">
        <option value="all">All matchdays</option>
        <option value="1">Matchday 1</option>
        <option value="2">Matchday 2</option>
        <option value="3">Matchday 3</option>
      </select>
      <select id="fxStatus" aria-label="Filter by status">
        <option value="all">All matches</option>
        <option value="upcoming">Upcoming</option>
        <option value="finished">Finished</option>
        <option value="live">Live</option>
      </select>
    </div>
    <div id="fxList"></div>
  </section>

  <section class="view on" id="view-live">
    <div class="live-grid" id="liveGrid"></div>
  </section>



  <section class="view" id="view-bracket"></section>
</main>

    'ENG':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','SCO':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','WAL':'🏴󠁧󠁢󠁷󠁬󠁳󠁿',

  };
  if (LOOKUP[s]) return LOOKUP[s];
  if (s.length === 2) return [...s].map(c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65)).join('');
  return '🏳';
}

/* ── Compute standings from finished games ── */
function computeStandings() {
  const init = id => ({ team: teamById[id], played:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0 });
  const groups = {};
  for (const g of Object.keys(DATA.groups)) {
    groups[g] = DATA.groups[g].map(init);
  }
  for (const m of DATA.games) {
    if (m.ko) continue;
    if (!m.finished) continue;
    const grp = groups[m.group];
    const h = grp.find(r => r.team.id === m.home);
    const a = grp.find(r => r.team.id === m.away);
    if (!h || !a) continue;
    h.played++; a.played++;
    h.gf += m.home_score; h.ga += m.away_score;
    a.gf += m.away_score; a.ga += m.home_score;
    if (m.home_score > m.away_score) { h.w++; h.pts+=3; a.l++; }
    else if (m.home_score < m.away_score) { a.w++; a.pts+=3; h.l++; }
    else { h.d++; a.d++; h.pts++; a.pts++; }
  }
  for (const g of Object.keys(groups)) {
    groups[g].forEach(r => r.gd = r.gf - r.ga);
    groups[g].sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.name.localeCompare(b.team.name));
  }
  return groups;
}

/* ── Helpers ── */
function fxStatus(m) {
  if (m.finished || m.status === 'finished') return 'finished';
  if (m.status === 'live') return 'live';
  const ko = new Date(m.date_iso);
  const now = new Date();
  if (now > ko && now - ko < 120*60*1000) return 'live';
  return 'upcoming';
}
function liveMinute(m) {
  // Use API elapsed time if available; otherwise just show LIVE
  // (worldcup26.ir doesn't send elapsed, so calculated minutes would be
  // off whenever a match starts late)
  if (typeof m.elapsed === 'number') {
    return m.elapsed + "\u2032";
  }
  if (m.status === 'HT') return 'HT';
  return 'LIVE';
}

/* ── Score cache: persists last known scores across page refreshes ── */
const CACHE_KEY = 'wc26_scores_v2';

function saveScores() {
  const scores = {};
  DATA.games.forEach(g => {
    if (g.home_score > 0 || g.away_score > 0 || g.finished || g.status === 'live') {
      scores[g.id] = {
        h: g.home_score,
        a: g.away_score,
        f: g.finished,
        s: g.status
      };
    }
  });
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(scores)); } catch(e) {}
}

function restoreScores() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return;
    const scores = JSON.parse(raw);
    DATA.games.forEach(g => {
      if (scores[g.id]) {
        g.home_score = scores[g.id].h;
        g.away_score = scores[g.id].a;
        g.finished   = scores[g.id].f;
        g.status     = scores[g.id].s;
      }
    });
  } catch(e) {}
}

const POLL_IDLE_MS = 10 * 60_000;

const TEAM_ALIASES = {
  "turkey":"turkiye",
  "congo dr":"dr congo",
  "czech republic":"czechia",
  "usa":"united states","united states of america":"united states",
  "korea republic":"south korea",

  "bosnia-herzegovina":"bosnia and herzegovina",
  "cote d'ivoire":"ivory coast",
  "cape verde islands":"cape verde","cabo verde":"cape verde"
};
const normaliseName = n => { const k = String(n||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim(); return TEAM_ALIASES[k]||k; };
const teamsByName = {};
DATA.teams.forEach(t => { teamsByName[normaliseName(t.name)] = t; });

/* ═══════════════════════════════════════════════════════════
   KNOCKOUTS — syncs knockout fixtures from the live feed into
   DATA.games (so Live & Fixtures show them) AND renders the bracket.
   ═══════════════════════════════════════════════════════════ */
const KO_ROUNDS = [
  { key:"R32", label:"Round of 32",    short:"R32"   },
  { key:"R16", label:"Round of 16",    short:"R16"   },
  { key:"QF",  label:"Quarter-finals", short:"QF"    },
  { key:"SF",  label:"Semi-finals",    short:"SF"    },
  { key:"F",   label:"Final",          short:"Final" },
];
const KO_LABEL = Object.fromEntries(KO_ROUNDS.map(r=>[r.key, r.label]));
let koActiveRound = "R32";

// group-stage pairs so we never mistake a group game for a knockout
const GROUP_PAIRS = new Set(
  DATA.games.map(g => {
    const h=teamById[g.home], a=teamById[g.away];
    return normaliseName(h.name)+"|"+normaliseName(a.name);
  })
);

function koRoundForDate(iso){
  if(!iso) return null;
  const t=new Date(iso).getTime();
  const d=(m,day)=>Date.UTC(2026,m,day);
  if(t < d(6,4))  return "R32";
  if(t < d(6,8))  return "R16";
  if(t < d(6,13)) return "QF";
  if(t < d(6,17)) return "SF";
  return "F";
}

// negative synthetic IDs for knockout teams not needed — we reuse real team ids.
// Sync feed knockout fixtures into DATA.games. Idempotent (keyed by pair+round).
const koGameIndex = {};   // pairKey -> game object in DATA.games
let koSynced = false;

function syncKnockouts(fixtures){
  for(const r of fixtures){
    if(!r.home || !r.away) continue;
    const pair = normaliseName(r.home)+"|"+normaliseName(r.away);
    if(GROUP_PAIRS.has(pair)) continue;       // group game, already in DATA
    const round = koRoundForDate(r.kickoff);
    if(!round) continue;
    const ht = teamsByName[normaliseName(r.home)];
    const at = teamsByName[normaliseName(r.away)];
    if(!ht || !at) continue;                  // can't place unknown team yet

    let g = koGameIndex[pair];
    if(!g){
      g = {
        id: 10000 + Object.keys(koGameIndex).length,
        home: ht.id, away: at.id,
        home_score: 0, away_score: 0,
        group: null, round: round, ko: true,
        matchday: 0,
        date_iso: r.kickoff || new Date().toISOString(),
        local_date: "", stadium_id: null,
        finished: false, status: "notstarted"
      };
      koGameIndex[pair] = g;
      DATA.games.push(g);
    }
    // update score/status from feed
    g.round = round;
    if(r.kickoff) g.date_iso = r.kickoff;
    if(r.home_score != null) g.home_score = r.home_score;
    if(r.away_score != null) g.away_score = r.away_score;
    if(typeof r.elapsed === 'number') g.elapsed = r.elapsed;
    if(LIVE_STATUSES.has(r.status)){ g.status='live'; g.finished=false; }
    else if(DONE_STATUSES.has(r.status) || r.finished){ g.status='finished'; g.finished=true; }
    else { if(!g.finished){ g.status='notstarted'; } }
  }
  koSynced = true;
}

function koWinSide(g){
  if(!g.finished) return 0;
  if(g.home_score > g.away_score) return 1;
  if(g.away_score > g.home_score) return 2;
  if(g.home_pens!=null && g.away_pens!=null) return g.home_pens>g.away_pens?1:2;
  return 0;
}

function koOwnerBadge(teamId){
  const o = (typeof teamOwner!=="undefined") ? teamOwner[teamId] : null;
  if(!o) return "";
  return `<span class="tie-owner" style="background:${o.color}">${esc(o.name)}</span>`;
}

function koTieHTML(g, isFinal){
  const home=teamById[g.home], away=teamById[g.away];
  const win=koWinSide(g);

    return `<span class="tie-score">${s??0}</span>`;

        <span class="tie-name">${esc(team.name)}</span>
        ${koOwnerBadge(team.id)}
      </div>${scoreCell(score,side)}</div>`;

  let meta="";

    meta=`<div class="tie-meta"><span class="live-tag"><span class="pulse-dot"></span>${esc(mins)}</span><span></span></div>`;

    meta=`<div class="tie-meta"><span>${esc(fmtDay.format(d))}</span><span>${esc(fmtTime.format(d))}</span></div>`;
  }
  return `<div class="tie${st==="live"?" is-live":""}${isFinal?" is-final":""}">
    ${row(home,g.home_score,1)}
    ${row(away,g.away_score,2)}
    ${meta}</div>`;
}

function koByRound(){
  const buckets={R32:[],R16:[],QF:[],SF:[],F:[]};
  DATA.games.forEach(g=>{ if(g.ko && g.round && buckets[g.round]) buckets[g.round].push(g); });
  for(const k in buckets) buckets[k].sort((a,b)=>new Date(a.date_iso)-new Date(b.date_iso));
  return buckets;
}

function koChampion(buckets){
  const fin=buckets.F[0];
  if(fin && fin.finished){
    const w=koWinSide(fin);
    if(w===1) return teamById[fin.home];
    if(w===2) return teamById[fin.away];
  }
  return null;
}

function renderBracket(){
  const root=$("#view-bracket"); if(!root) return;
  const buckets=koByRound();
  const total=Object.values(buckets).reduce((n,a)=>n+a.length,0);
  if(total===0){
    root.innerHTML=`<div class="ko-empty"><div class="ic">🏆</div>
      <div>The knockout bracket appears here once the Round of 32 is set.</div></div>`;
    return;
  }
  const champ=koChampion(buckets);
  const champHTML = champ
    ? `<div class="ko-champ"><span class="trophy">🏆</span><div>
        <div class="lbl">World Champions</div>
        <div class="who">${isoToEmoji(champ.iso2)} ${esc(champ.name)}</div></div></div>` : "";
  const roundBtns = KO_ROUNDS.filter(r=>buckets[r.key].length)
    .map(r=>`<button class="ko-round-btn${r.key===koActiveRound?" active":""}" data-round="${r.key}">${esc(r.short)}</button>`).join("");
  const treeCols = KO_ROUNDS.map(r=>{
    const ts=buckets[r.key];
    if(!ts.length && r.key!=="R32") return "";
    const isFinal=r.key==="F";
    const inner = ts.length
      ? ts.map(g=>`<div class="tie-slot">${koTieHTML(g,isFinal)}</div>`).join("")
      : `<div class="tie-slot"><div class="tie tie-tbd"><div class="tie-row"><div class="tie-team"><span class="tie-name">To be decided</span></div></div></div></div>`;
    return `<div class="ko-col${isFinal?" final-col":""}"><div class="ko-col-hdr">${esc(r.label)}</div>${inner}</div>`;
  }).join("");
  if(!buckets[koActiveRound] || !buckets[koActiveRound].length){
    const firstWith = KO_ROUNDS.find(r=>buckets[r.key].length);
    if(firstWith) koActiveRound=firstWith.key;
  }
  const activeTies=buckets[koActiveRound]||[];
  const listHTML = activeTies.length
    ? activeTies.map(g=>koTieHTML(g,koActiveRound==="F")).join("")
    : `<div class="ko-empty">Not yet decided.</div>`;
  root.innerHTML=`
    <div class="ko-intro">
      <div><div class="ko-title">Road to the Final</div>
        <div class="ko-sub">Round of 32 to the Final</div></div>
      ${champHTML}
    </div>
    <div class="ko-rounds">${roundBtns}</div>
    <div class="ko-list">${listHTML}</div>
    <div class="ko-tree-wrap"><div class="ko-tree">${treeCols}</div></div>`;
  root.querySelectorAll(".ko-round-btn").forEach(b=>{
    b.addEventListener("click",()=>{ koActiveRound=b.dataset.round; renderBracket(); });
  });
}


function matchLocalGame(remote) {
  // Match by team names only - external feed IDs no longer align with rebuilt schedule
  const h = teamsByName[normaliseName(remote.home)];
  const a = teamsByName[normaliseName(remote.away)];
  if (!h || !a) return null;
  return DATA.games.find(g => g.home === h.id && g.away === a.id) || null;
}

const LIVE_STATUSES = new Set(["1H","HT","2H","ET","BT","P","LIVE","INT"]);
const DONE_STATUSES = new Set(["FT","AET","PEN"]);

function applyRemote(remote) {
  let changed = false;
  for (const r of remote.fixtures) {
    const local = matchLocalGame(r);
    if (!local) continue;
    if (local.finished) continue; // never modify a locked result
    const newScore = local.home_score !== (r.home_score??0) || local.away_score !== (r.away_score??0);
    const newStatus = (LIVE_STATUSES.has(r.status) && local.status !== 'live')
                   || (DONE_STATUSES.has(r.status) && !local.finished);
    if (newScore || newStatus) changed = true;
    const downgrade = (r.home_score === 0 && r.away_score === 0 && r.status === "NS" &&
                       (local.home_score > 0 || local.away_score > 0 || local.status === "live"));
    if (!downgrade) {
      if (r.home_score != null) local.home_score = r.home_score;
      if (r.away_score != null) local.away_score = r.away_score;
    }
    if (typeof r.elapsed === 'number') local.elapsed = r.elapsed;
    if (LIVE_STATUSES.has(r.status)) { local.status='live'; local.finished=false; }
    else if (DONE_STATUSES.has(r.status) || r.finished) { local.status='finished'; local.finished=true; }
  }
  return changed;
}

function anyMatchInLiveWindow() {
  const now = Date.now();
  return DATA.games.some(g => {
    const ko = new Date(g.date_iso).getTime();
    return now >= ko && now <= ko + MATCH_WINDOW_MS && !g.finished;
  });
}

async function pollFixtures() {
  try {
    const r = await fetch('/api/fixtures', { cache:'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    syncKnockouts(j.fixtures || []);
    applyRemote(j);
    saveScores();
    renderGroups(); renderFixtures(); renderLive(); renderSweepstake(); renderBracket();
    const activeTzBtn = document.querySelector(".tz-btn.active");
    const tzLabel = activeTzBtn ? activeTzBtn.dataset.label : "SYD";
    $("#stamp").textContent = "UPDATED " +
      new Date().toLocaleTimeString('en-AU',{timeZone:TZ,hour:'2-digit',minute:'2-digit',hour12:false}) +
      " · " + tzLabel;
  } catch(e) { console.warn('Live update failed:', e.message); }
}

function scheduleNext() {
  setTimeout(async () => { await pollFixtures(); scheduleNext(); },
    anyMatchInLiveWindow() ? POLL_LIVE_MS : POLL_IDLE_MS);
}
pollFixtures().then(scheduleNext);

</script>
